<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Styles</title>
    <style>
        body {
            font-family: serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 40px;
            background-color: #f0f0f0;
        }

        .box {
            width: 500px;
            font-size: 32px;
            font-weight: bold;
        }

        .box-1 {
    		background-color: #add8e6;
    
   	 		/* 1. 設定內圈細線 (2px) */
    		border: 4px solid #ff7f50; 
    
    		/* 2. 設定外圈粗線 (6px) */
    		outline: 3px solid #ff7f50; 
    
    		/* 3. 關鍵：這行讓外線跟內線中間留一點點小縫隙，更有層次感 */
    		
    		outline-offset: 2px; 
    
		}

        .box-2 {
            background-color: #ffff00;
            border: 2px solid #4169e1;
            border-radius: 15px;
        }

        .box-3 {
            background-color: #5cb85c;
            border: 6px dotted #808080;
        }
    </style>
</head>
<body>

    <div class="box box-1">Hello World</div>
    <div class="box box-2">Hello World</div>
    <div class="box box-3">Hello World</div>

</body>
</html>
